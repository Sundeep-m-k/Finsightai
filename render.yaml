# Render blueprint (optional). Use Dashboard to create services if you prefer.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: finsight-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars: []

  - type: web
    name: finsight-ai-service
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt && python -m app.rag.ingest
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
        optional: true
