# Render blueprint — https://render.com/docs/blueprint-spec
# Deploy order: backend first, then ai-service, then set Vercel env vars.

services:
  - type: web
    name: finscope-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars: []

  - type: web
    name: finscope-ai-service
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt && python -m app.rag.ingest
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BINGHAMTON_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
